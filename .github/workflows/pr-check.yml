name: PR Check

on:
  pull_request:
    branches:
      - main

permissions:
  id-token: write
  contents: read
  pull-requests: write   # needed to post the cdk diff comment

jobs:
  test-and-diff:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Install backend dependencies
        run: npm install

      - name: Install frontend dependencies
        run: |
          cd lib/user-interface/app
          npm install

      - name: Run backend Lambda tests
        run: npm run test:lambda

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python test dependencies
        run: pip install pytest pytest-cov moto boto3 pydantic openpyxl python-jose requests cryptography

      - name: Run Python Lambda tests
        run: |
          python3 -m pytest \
            lib/chatbot-api/functions/excel-index/query/test_excel_query.py \
            lib/chatbot-api/functions/excel-index/parser/test_excel_parser.py \
            lib/chatbot-api/functions/metadata-retrieval/test_metadata_cache.py \
            lib/authorization/websocket-api-authorizer/test_jwt_authorizer.py \
            lib/chatbot-api/functions/metadata-handler/test_metadata_handler.py \
            lib/chatbot-api/functions/session-handler/test_session_handler.py \
            --cov --cov-report=term-missing --cov-report=xml:coverage-python.xml \
            -v

      - name: Run frontend tests with coverage
        run: |
          cd lib/user-interface/app
          npm run test:coverage

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            lib/user-interface/app/coverage/lcov.info
            coverage-python.xml
          if-no-files-found: ignore

      - name: Post coverage summary as PR comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            let body = '## Coverage Summary\n';

            // Frontend (lcov)
            const lcovPath = 'lib/user-interface/app/coverage/lcov.info';
            if (fs.existsSync(lcovPath)) {
              const lcov = fs.readFileSync(lcovPath, 'utf8');
              const linesFound = (lcov.match(/^LF:(\d+)/gm) || []).reduce((s, l) => s + parseInt(l.slice(3)), 0);
              const linesHit   = (lcov.match(/^LH:(\d+)/gm) || []).reduce((s, l) => s + parseInt(l.slice(3)), 0);
              const pct = linesFound > 0 ? ((linesHit / linesFound) * 100).toFixed(1) : 'n/a';
              body += `\n### Frontend (Vitest)\nLines: **${pct}%** (${linesHit}/${linesFound})\n`;
            } else {
              body += '\n### Frontend (Vitest)\n_Coverage report not found._\n';
            }

            // Python (Cobertura XML)
            const xmlPath = 'coverage-python.xml';
            if (fs.existsSync(xmlPath)) {
              const xml = fs.readFileSync(xmlPath, 'utf8');
              const m = xml.match(/line-rate="([0-9.]+)"/);
              const pct = m ? (parseFloat(m[1]) * 100).toFixed(1) : 'n/a';
              body += `\n### Python (pytest-cov)\nLines: **${pct}%**\n`;
            } else {
              body += '\n### Python (pytest-cov)\n_Coverage report not found._\n';
            }

            // Delete previous coverage comment from this bot
            const { data: comments } = await github.rest.issues.listComments({
              ...context.repo,
              issue_number: context.issue.number,
            });
            for (const comment of comments) {
              if (comment.user.login === 'github-actions[bot]' && comment.body.startsWith('## Coverage Summary')) {
                await github.rest.issues.deleteComment({
                  ...context.repo,
                  comment_id: comment.id,
                });
              }
            }

            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: context.issue.number,
              body,
            });

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1
          role-session-name: pr-diff-${{ github.event.pull_request.number }}

      - name: CDK diff
        id: diff
        run: |
          npx cdk diff ABEStackNonProd 2>&1 | head -300 > cdk-diff.txt || true

      - name: Post CDK diff as PR comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const diff = fs.readFileSync('cdk-diff.txt', 'utf8').trim();
            const body = diff.length > 0
              ? `## CDK Diff\n\`\`\`\n${diff}\n\`\`\``
              : `## CDK Diff\nNo infrastructure changes detected.`;

            // Delete previous diff comment from this bot on the same PR
            const { data: comments } = await github.rest.issues.listComments({
              ...context.repo,
              issue_number: context.issue.number,
            });
            for (const comment of comments) {
              if (comment.user.login === 'github-actions[bot]' && comment.body.startsWith('## CDK Diff')) {
                await github.rest.issues.deleteComment({
                  ...context.repo,
                  comment_id: comment.id,
                });
              }
            }

            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: context.issue.number,
              body,
            });
