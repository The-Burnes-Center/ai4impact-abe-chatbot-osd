name: Deploy Chatbot
on:
  push:
    branches:
      - main
permissions:
  id-token: "write"
  contents: "read"
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
        aws-region: us-east-1
        role-session-name: ${{ github.actor }}
    - name: Install backend dependencies
      run: npm install
    - name: Install frontend dependencies
      run: |
        cd lib/user-interface/app
        npm install
    - name: Run backend Lambda tests
      run: npm run test:lambda
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: Install Python test dependencies
      run: pip install pytest moto boto3 pydantic python-jose requests cryptography
    - name: Run Python Lambda tests
      run: |
        python3 -m pytest \
          lib/chatbot-api/functions/excel-index/query/test_excel_query.py \
          lib/chatbot-api/functions/metadata-retrieval/test_metadata_cache.py \
          lib/authorization/websocket-api-authorizer/test_jwt_authorizer.py \
          lib/chatbot-api/functions/metadata-handler/test_metadata_handler.py \
          -v
    - name: Run frontend tests
      run: |
        cd lib/user-interface/app
        npm test
    - name: Bootstrap AWS environment
      run: npx cdk bootstrap || true
    - name: Wait for stack to reach stable state
      run: |
        STATUS=$(aws cloudformation describe-stacks --stack-name ABEStackNonProd --query "Stacks[0].StackStatus" --output text 2>/dev/null || echo "DOES_NOT_EXIST")
        echo "Current stack status: $STATUS"
        case "$STATUS" in
          *_IN_PROGRESS)
            echo "Stack is in progress ($STATUS), waiting for it to stabilize..."
            aws cloudformation wait stack-exists --stack-name ABEStackNonProd
            # Wait for any in-progress operation to complete (up to 30 min)
            timeout 1800 bash -c '
              while true; do
                S=$(aws cloudformation describe-stacks --stack-name ABEStackNonProd --query "Stacks[0].StackStatus" --output text)
                echo "  status: $S"
                case "$S" in *_IN_PROGRESS) sleep 15 ;; *) break ;; esac
              done
            '
            FINAL=$(aws cloudformation describe-stacks --stack-name ABEStackNonProd --query "Stacks[0].StackStatus" --output text)
            echo "Stack settled at: $FINAL"
            # Fail the deploy if the previous operation ended in a failed state
            case "$FINAL" in
              *_FAILED|ROLLBACK_COMPLETE) echo "Stack is in a failed state: $FINAL"; exit 1 ;;
            esac
            ;;
          DOES_NOT_EXIST)
            echo "Stack does not exist yet, proceeding with fresh deploy."
            ;;
          *)
            echo "Stack is stable ($STATUS), proceeding."
            ;;
        esac
    - name: Deploy CDK stack
      run: |
        ALARM_FLAG=""
        if [ -n "${{ secrets.ALARM_EMAIL }}" ]; then
          ALARM_FLAG="-c alarmEmail=${{ secrets.ALARM_EMAIL }}"
        fi
        npx cdk deploy ABEStackNonProd $ALARM_FLAG --require-approval never
    - name: Fetch CloudFormation Outputs
      run: |
        aws cloudformation describe-stacks --stack-name ABEStackNonProd --query "Stacks[0].Outputs" > stack-outputs.json
        cat stack-outputs.json
    - name: Upload Outputs as Artifact
      uses: actions/upload-artifact@v4
      with:
        name: stack-outputs
        path: stack-outputs.json
